path_specific: "microdoppler_sqvae_gaussian_3_highres_32/"

dataset:
  name: 'MicroDoppler'
  shape: (3, 256, 256)  # 使用原始分辨率
  dim_x: 196608  # 3 * 256 * 256

model:
  name: "GaussianSQVAE"
  log_param_q_init: 2.995732273553991 # log(20.0)
  param_var_q: "gaussian_3"

network:
  name: "highres_resnet"  # 使用新的高分辨率网络架构
  num_rb: 8  # 增加ResBlock数量以处理更复杂的特征

train:
  bs: 8  # 由于图像更大，减小batch size
  lr: 0.0005  # 使用较小的学习率以稳定训练
  epoch_max: 150  # 增加训练轮数

quantization:
  size_dict: 2048  # 增加字典大小以适应更复杂的图像特征
  dim_dict: 128  # 增加每个编码的维度 