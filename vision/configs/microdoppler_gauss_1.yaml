path_specific: "microdoppler_sqvae_gaussian_1/"

dataset:
  name: 'MicroDoppler'
  shape: (3, 64, 64)
  dim_x: 12288 # 3 * 64 * 64

model:
  name: "GaussianSQVAE"
  log_param_q_init: 2.995732273553991 # log(20.0)
  param_var_q: "gaussian_1"

network:
  name: "resnet"
  num_rb: 6

train:
  bs: 32
  lr: 0.001
  epoch_max: 100

quantization:
  size_dict: 512
  dim_dict: 64 