path_specific: "microdoppler_sqvae_gaussian_3_deep/"

dataset:
  name: 'MicroDoppler'
  shape: (3, 64, 64)  # 使用标准分辨率
  dim_x: 12288  # 3 * 64 * 64

model:
  name: "GaussianSQVAE"
  log_param_q_init: 2.995732273553991 # log(20.0)
  param_var_q: "gaussian_3"
  # 增加重建损失权重，减小隐空间损失权重
  recon_weight: 2.5
  latent_weight: 0.5

network:
  name: "resnet"  # 使用标准ResNet架构
  num_rb: 16  # 增加到16个残差块
  activation: "swish"  # 使用Swish激活函数提高表达能力
  # 增加通道数
  channel_multiplier: 2.0  # 通道数翻倍
  
train:
  bs: 24  # 减小批次大小以适应更大的网络
  lr: 0.0002  # 使用更小的学习率以稳定训练
  epoch_max: 200  # 增加训练轮数
  # 添加学习率调度
  lr_scheduler: "cosine"
  warmup_epochs: 10  # 更长的预热期

quantization:
  size_dict: 1024  # 使用标准SQ-VAE的码本大小
  dim_dict: 64  # 编码维度 