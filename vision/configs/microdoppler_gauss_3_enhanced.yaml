path_specific: "microdoppler_sqvae_gaussian_3_enhanced/"

dataset:
  name: 'MicroDoppler'
  shape: (3, 64, 64)
  dim_x: 12288 # 3 * 64 * 64

model:
  name: "EnhancedGaussianSQVAE"  # 使用增强型模型
  log_param_q_init: 2.995732273553991 # log(20.0)
  param_var_q: "gaussian_3"
  use_perceptual: True  # 使用感知损失
  perceptual_weight: 0.05  # 感知损失权重
  use_spectral: True  # 使用频谱损失
  spectral_weight: 0.05  # 频谱损失权重

network:
  name: "enhanced_resnet"  # 使用增强型解码器
  num_rb: 6
  enhancer_type: "microdoppler"  # 使用微多普勒增强器

train:
  bs: 32
  lr: 0.001
  epoch_max: 100

quantization:
  size_dict: 512
  dim_dict: 64

processing:
  method: "resize"  # 使用resize而非downsample 